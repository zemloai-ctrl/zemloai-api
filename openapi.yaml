openapi: 3.0.0
info:
  title: Zemlo AI Signal API
  description: The Global Logistics Signal Layer. Provides AI-driven situational awareness, Trust Scores, and compliance checklists.
  version: 1.0.0
servers:
  - url: https://zemloai-api.onrender.com
    description: Production server
paths:
  /signal:
    get:
      summary: Get a logistics signal
      description: Returns a price range, trust score, risk assessment, and a 3-step compliance checklist.
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
          example: Helsinki
        - name: to
          in: query
          required: true
          schema:
            type: string
          example: Belgrade
        - name: cargo
          in: query
          required: false
          schema:
            type: string
          example: Industrial batteries
        - name: weight
          in: query
          required: false
          schema:
            type: number
          example: 200
      responses:
        '200':
          description: A successful logistics signal
          content:
            application/json:
              schema:
                type: object
                properties:
                  signal:
                    type: object
                    properties:
                      price_estimate: {type: string}
                      trust_score: {type: integer}
                      transport_mode: {type: string}
                      risk_level: {type: string}
                  do_these_3_things:
                    type: array
                    items: {type: string}
                  metadata:
                    type: object
                    properties:
                      engine: {type: string}
